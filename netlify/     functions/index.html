<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UID Checker</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 60px auto;
      text-align: center;
    }
    input {
      padding: 10px;
      width: 80%;
      font-size: 16px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #gamename1 {
      margin-top: 15px;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h2>UID Checker</h2>
  <input type="text" id="player_id" placeholder="Enter UID" />
  <br />
  <button class="gamename1">Check UID</button>
  <div id="gamename1"></div>

  <script>
    // ⚠️ Ei site ta kon client er, seta ekhane set koro
    // client1 / client2 / client3
    const CLIENT_ID = "client1";

    $(document).ready(function () {

      $('.gamename1').on('click', function () {

        let uid = $('#player_id').val().trim();

        if (uid.length < 3) {
          $('#gamename1').html('❌ Enter a valid UID');
          return;
        }

        $('#gamename1').html('⏳ Checking UID ...');

        let myApiUrl = "/.netlify/functions/check?uid=" + encodeURIComponent(uid) + "&client=" + CLIENT_ID;

        $.ajax({
          url: myApiUrl,
          method: "GET",
          dataType: "json",
          success: function (res) {
            if (res && res.nickname) {
              let regionSuffix = res.region ? ' (' + res.region + ')' : '';
              $('#gamename1').html(res.nickname + regionSuffix);
            } else {
              $('#gamename1').html('❌ No Profile Found');
            }
          },
          error: function (xhr) {
            try {
              let errRes = JSON.parse(xhr.responseText);
              if (errRes.error === "ID NOT FOUND") {
                $('#gamename1').html('❌ UID সঠিক নয়');
              } else {
                $('#gamename1').html('❌ API Error');
              }
            } catch (e) {
              $('#gamename1').html('❌ API Error');
            }
          }
        });

      });

    });
  </script>

</body>
</html>
